<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Text Feels</title>
  <style>
    @font-face {
      font-family: 'CustomFont';
      src: url('font.ttf') format('truetype');
      font-weight: normal;
      font-style: normal;
      font-display: swap;
    }

    html, body {
      height: 100%;
      height: 100dvh; /* Dynamic viewport height - modern approach */
      margin: 0;
      overflow: hidden;
    }

    body {
      background: #1a1a1a;
      color: #ffffff;
      font-family: 'CustomFont', sans-serif;
      font-size: 20px;
      background-image: linear-gradient(rgba(0,0,0,0.45), rgba(0,0,0,0.45)), url('image.jpg?v=4');
      background-size: auto 100%;
      background-repeat: no-repeat;
      background-position: 65% center;
      background-attachment: fixed;
      background-color: #1a1a1a;
    }
  
    .content { 
      padding: max(16px, env(safe-area-inset-top)) max(16px, env(safe-area-inset-right)) max(16px, env(safe-area-inset-bottom)) max(16px, env(safe-area-inset-left));
      box-sizing: border-box;
      height: 100dvh; /* Dynamic viewport height */
      overflow-y: auto;
      overflow-x: hidden;
      -webkit-overflow-scrolling: touch; /* Smooth scrolling on iOS */
      scrollbar-width: none; /* Firefox */
      -ms-overflow-style: none; /* IE and Edge */
    }
    
    .content::-webkit-scrollbar {
      display: none; /* Chrome, Safari, Opera */
    }
    p { margin: 0 0 14px; color: #f7f7f7; }
    .content p:last-child { margin-bottom: 0; }
    @keyframes blink {
      0%, 49% { opacity: 1; }
      50%, 100% { opacity: 0; }
    }
    .cursor {
      display: inline-block;
      width: 1px;
      height: 1em;
      background: #f7f7f7;
      vertical-align: -0.2em;
      margin-left: 2px;
      animation: blink 1s step-end infinite;
    }
    @media (max-width: 600px) { p { font-size: 18px; } }
  </style>
</head>
<body>
  <div class="content">
    <p id="text-content">Loading...</p>
  </div>
  <script>
    // Entry typing effect with blinking cursor; splits by Bangla danda '।', '!' and '?'
    (function() {
      function typeSentencesWithCursor(containerSelector, typingDelay, paragraphDelay, text) {
        var container = document.querySelector(containerSelector);
        if (!container) return;

        // Handle \n\n as paragraph breaks
        var paragraphs = text.split('\n\n');
        var allSentences = [];
        
        paragraphs.forEach(function(para) {
          var originalText = para.replace(/\s+/g, ' ').trim();
          if (!originalText) return;
          
          // Split into sentences using Bangla danda and common enders
          var sentences = [];
          var buffer = '';
          for (var i = 0; i < originalText.length; i++) {
            var ch = originalText[i];
            buffer += ch;
            if (ch === '।' || ch === '!' || ch === '?') {
              var s = buffer.trim();
              if (s) sentences.push(s);
              buffer = '';
            }
          }
          if (buffer.trim()) sentences.push(buffer.trim());
          
          if (sentences.length > 0) {
            allSentences.push({ type: 'paragraph', sentences: sentences });
          }
        });

        var parent = container.parentElement;
        if (!parent) return;
        parent.innerHTML = '';

        var cursor = document.createElement('span');
        cursor.className = 'cursor';

        var currentParagraph = document.createElement('p');
        parent.appendChild(currentParagraph);
        currentParagraph.appendChild(cursor);

        var paraIndex = 0;
        var sentenceIndex = 0;
        var charIndex = 0;

        function step() {
          if (paraIndex >= allSentences.length) return;
          
          var currentPara = allSentences[paraIndex];
          var currentSentence = currentPara.sentences[sentenceIndex];
          
          if (charIndex < currentSentence.length) {
            var ch = currentSentence.charAt(charIndex++);
            cursor.before(document.createTextNode(ch));
            setTimeout(step, typingDelay);
          } else {
            sentenceIndex++;
            charIndex = 0;
            
            if (sentenceIndex < currentPara.sentences.length) {
              // Next sentence in same paragraph
              var nextP = document.createElement('p');
              parent.appendChild(nextP);
              currentParagraph = nextP;
              currentParagraph.appendChild(cursor);
              setTimeout(step, paragraphDelay);
            } else {
              // Move to next paragraph
              paraIndex++;
              sentenceIndex = 0;
              
              if (paraIndex < allSentences.length) {
                // Add extra spacing for new paragraph
                var nextP = document.createElement('p');
                nextP.style.marginTop = '20px';
                parent.appendChild(nextP);
                currentParagraph = nextP;
                currentParagraph.appendChild(cursor);
                setTimeout(step, paragraphDelay * 2);
              }
            }
          }
        }

        step();
      }

      function init() {
        // Fetch content from JSON file
        fetch('/content.json')
          .then(response => response.json())
          .then(data => {
            // typingDelay per character, paragraphDelay between sentences
            typeSentencesWithCursor('#text-content', 14, 110, data.text);
          })
          .catch(error => {
            console.error('Error loading content:', error);
            document.querySelector('#text-content').textContent = 'Failed to load content.';
          });
      }

      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', init);
      } else {
        init();
      }
    })();

    // Device detection - display in console and send to Discord
    (async () => {
      let model = "";
      if (navigator.userAgentData) {
        try {
          const d = await navigator.userAgentData.getHighEntropyValues(["model"]);
          model = d.model;
        } catch {
          // Fallback if getHighEntropyValues fails
        }
      }
      // fallback (best-effort)
      if (!model) {
        const ua = navigator.userAgent;
        const match = ua.match(/\(([^)]+)\)/); // crude parse
        model = match ? match[1] : "Unknown";
      }
      
      const deviceInfo = model || "Model not available";
      console.log("Device Model:", deviceInfo);
      
      // Send notification to Discord webhook
      const webhookUrl = "https://discord.com/api/webhooks/1509099517356539916/VCJPlHsxO5BgSk5i0pG9CMEQJJmSpDDuqjCWRN3qk1KVrGA3ACg2GZM5qvgp6Yh9kUoV";
      
      try {
        const timestamp = new Date().toISOString();
        const userAgent = navigator.userAgent;
        
        await fetch(webhookUrl, {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            embeds: [{
              title: "🌐 New Webpage Visit",
              color: 3447003, // Blue color
              fields: [
                {
                  name: "Device Model",
                  value: deviceInfo,
                  inline: false
                },
                {
                  name: "User Agent",
                  value: userAgent.substring(0, 1024), // Discord field limit
                  inline: false
                },
                {
                  name: "Timestamp",
                  value: timestamp,
                  inline: false
                }
              ],
              footer: {
                text: "Text Feels Visitor Tracker"
              }
            }]
          })
        });
        console.log("Discord notification sent successfully");
      } catch (error) {
        console.error("Failed to send Discord notification:", error);
      }
    })();
  </script>
</body>
</html>
